name: Deprecated Cloud Run dev deploy

# ADR 0010 moved the API runtime from GCP Cloud Run to Azure Container Apps.
# This workflow is intentionally manual/no-op so pushes to main cannot recreate
# the deleted Cloud Run service or run the stale Firebase smoke path.

on:
  workflow_dispatch:

jobs:
  disabled:
    name: Cloud Run deploy disabled by ADR 0010
    runs-on: ubuntu-latest
    steps:
      - name: Explain
        run: |
          echo "Cloud Run deployment is deprecated."
          echo "Use deploy-azure-api-dev.yml for the active API runtime."
