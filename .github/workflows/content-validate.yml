name: Validate expedition content

# Fast, focused workflow that runs only when content or its validator changes.
# A broken expedition fails here and never merges. See docs/expedition-authoring.md.

on:
  pull_request:
    paths:
      - "content/**"
      - "backend/app/models/expedition.py"
      - "scripts/validate_content.py"
      - "scripts/regenerate_schema.py"
  push:
    branches: [main]
    paths:
      - "content/**"
      - "backend/app/models/expedition.py"
      - "scripts/validate_content.py"
      - "scripts/regenerate_schema.py"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Validate expedition JSON
        working-directory: backend
        run: uv run python ../scripts/validate_content.py

      - name: Confirm JSON schema is up to date
        working-directory: backend
        # regenerate_schema.py is idempotent; if the committed schema doesn't
        # match the Pydantic model, git diff --exit-code fails.
        run: |
          uv run python ../scripts/regenerate_schema.py
          git diff --exit-code content/schema/expedition.schema.json
