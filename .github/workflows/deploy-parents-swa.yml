name: Deploy parents web to Azure Static Web Apps (dev)

# Phase 8 of the GCP -> Azure migration. Builds the Expo web bundle from
# mobile/ and ships it to Azure Static Web Apps site `dragonfly-parents-swa`.
# Runs alongside the existing Firebase Hosting deploy workflow during the
# Phase 9 DNS cutover; the Firebase workflow is removed in Phase 10.

on:
  push:
    branches:
      - main
    paths:
      - "mobile/**"
      - ".github/workflows/deploy-parents-swa.yml"
  workflow_dispatch:

concurrency:
  group: deploy-parents-swa
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + deploy to Static Web Apps
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Export web bundle
        run: npx expo export --platform web

      - name: Deploy to dragonfly-parents-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_PARENTS_SWA_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          # Output of `expo export --platform web` lives in mobile/dist.
          # The SWA action runs in a docker container with /github/workspace
          # mounted at repo root, so the path is resolved from there --
          # NOT from the workflow's working-directory.
          # `skip_app_build: true` short-circuits the Oryx build that
          # static-web-apps-deploy would otherwise attempt.
          app_location: "mobile/dist"
          output_location: ""
          skip_app_build: true
