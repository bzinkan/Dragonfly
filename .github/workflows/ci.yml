name: CI

# Runs on every PR and every push (any branch).
# - backend: ruff + mypy + pytest with coverage
# - content: validates expedition JSON
#
# Note: the legacy AWS CDK diff job was removed when the GCP/Cloud Run
# migration began (ADR 0005). When infra-gcp/ has a real Terraform
# configuration, add a terraform-plan job here scoped to PRs only.

on:
  pull_request:
  push:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install backend dependencies
        working-directory: backend
        run: uv sync

      - name: Lint (ruff)
        working-directory: backend
        run: uv run ruff check .

      - name: Format check (ruff)
        working-directory: backend
        run: uv run ruff format --check .

      - name: Typecheck (mypy)
        working-directory: backend
        run: uv run mypy app

      - name: Test (pytest + coverage)
        working-directory: backend
        run: uv run pytest -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: backend/coverage.xml
          retention-days: 14
