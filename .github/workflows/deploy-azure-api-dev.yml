name: Deploy Azure API dev

# Manual until the Azure federated-identity secrets are configured in GitHub.
# Once AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID exist, this
# can be safely re-enabled on push to main.
on:
  workflow_dispatch:

concurrency:
  group: deploy-azure-api-dev
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: hinterland-dev-rg
  AZURE_ACR_NAME: hinterlandacrdev
  AZURE_CONTAINER_APP: hinterland-api
  IMAGE_REPOSITORY: hinterland-api

jobs:
  deploy:
    name: Build, deploy, migrate, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show \
            --name "${AZURE_ACR_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query loginServer \
            --output tsv)"
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "${GITHUB_ENV}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          az acr build \
            --registry "${AZURE_ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --image "${IMAGE_REPOSITORY}:latest" \
            backend

      - name: Deploy Container App revision
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE}" \
            --set-env-vars \
              HINTERLAND_DEV_AUTH_ENABLED=true \
              HINTERLAND_DEV_AUTH_TOKEN=hinterland-dev-bypass

      - name: Run Alembic migrations
        run: |
          set -euo pipefail
          script -q -e -c "az containerapp exec --name \"${AZURE_CONTAINER_APP}\" --resource-group \"${AZURE_RESOURCE_GROUP}\" --command \"/app/.venv/bin/alembic upgrade head\"" /dev/null

      - name: Smoke probes
        run: |
          set -euo pipefail
          FQDN="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          API_BASE_URL="https://${FQDN}"
          echo "API_BASE_URL=${API_BASE_URL}" >> "${GITHUB_ENV}"
          smoke_get() {
            local path="$1"
            shift
            local status
            local body
            for attempt in 1 2 3 4 5; do
              body="$(mktemp)"
              status="$(curl --silent --show-error --output "${body}" --write-out "%{http_code}" "$@" "${API_BASE_URL}${path}" || true)"
              cat "${body}"
              rm -f "${body}"
              echo
              if [[ "${status}" == 2* ]]; then
                return 0
              fi
              echo "Smoke probe ${path} failed with HTTP ${status} (attempt ${attempt}/5)."
              sleep 5
            done
            return 1
          }
          smoke_get "/health"
          smoke_get "/ready"
          smoke_get "/.well-known/hinterland-kid-jwks.json"
          smoke_get "/v1/me" --header "Authorization: Bearer hinterland-dev-bypass"
          smoke_get "/v1/observations/me" --header "Authorization: Bearer hinterland-dev-bypass"

      - name: Authenticated parent/kid smoke
        env:
          HINTERLAND_SMOKE_ENTRA_BEARER: ${{ secrets.HINTERLAND_SMOKE_ENTRA_BEARER }}
        run: |
          set -euo pipefail
          if [ -z "${HINTERLAND_SMOKE_ENTRA_BEARER:-}" ]; then
            echo "HINTERLAND_SMOKE_ENTRA_BEARER is not configured; skipping authenticated smoke."
            exit 0
          fi
          HINTERLAND_API_BASE_URL="${API_BASE_URL}" python scripts/smoke_azure_parent_kid.py
