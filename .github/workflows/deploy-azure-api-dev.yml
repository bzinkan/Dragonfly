name: Deploy Azure API dev

# Manual until the Azure federated-identity secrets are configured in GitHub.
# Once AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID exist, this
# can be safely re-enabled on push to main.
on:
  workflow_dispatch:

concurrency:
  group: deploy-azure-api-dev
  cancel-in-progress: false

env:
  AZURE_RESOURCE_GROUP: dragonfly-dev-rg
  AZURE_ACR_NAME: dragonflyacrdev
  AZURE_CONTAINER_APP: dragonfly-api
  IMAGE_REPOSITORY: dragonfly-api

jobs:
  deploy:
    name: Build, deploy, migrate, smoke
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        run: |
          set -euo pipefail
          ACR_LOGIN_SERVER="$(az acr show \
            --name "${AZURE_ACR_NAME}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query loginServer \
            --output tsv)"
          IMAGE="${ACR_LOGIN_SERVER}/${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          echo "ACR_LOGIN_SERVER=${ACR_LOGIN_SERVER}" >> "${GITHUB_ENV}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"
          az acr build \
            --registry "${AZURE_ACR_NAME}" \
            --image "${IMAGE_REPOSITORY}:${GITHUB_SHA}" \
            --image "${IMAGE_REPOSITORY}:latest" \
            backend

      - name: Deploy Container App revision
        run: |
          set -euo pipefail
          az containerapp update \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${IMAGE}"

      - name: Run Alembic migrations
        run: |
          set -euo pipefail
          az containerapp exec \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --command "/app/.venv/bin/alembic upgrade head"

      - name: Smoke probes
        run: |
          set -euo pipefail
          FQDN="$(az containerapp show \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --query properties.configuration.ingress.fqdn \
            --output tsv)"
          API_BASE_URL="https://${FQDN}"
          echo "API_BASE_URL=${API_BASE_URL}" >> "${GITHUB_ENV}"
          curl --fail --silent --show-error "${API_BASE_URL}/health"
          curl --fail --silent --show-error "${API_BASE_URL}/ready"
          curl --fail --silent --show-error "${API_BASE_URL}/.well-known/dragonfly-kid-jwks.json"

      - name: Authenticated parent/kid smoke
        env:
          DRAGONFLY_SMOKE_ENTRA_BEARER: ${{ secrets.DRAGONFLY_SMOKE_ENTRA_BEARER }}
        run: |
          set -euo pipefail
          if [ -z "${DRAGONFLY_SMOKE_ENTRA_BEARER:-}" ]; then
            echo "DRAGONFLY_SMOKE_ENTRA_BEARER is not configured; skipping authenticated smoke."
            exit 0
          fi
          DRAGONFLY_API_BASE_URL="${API_BASE_URL}" python scripts/smoke_azure_parent_kid.py
